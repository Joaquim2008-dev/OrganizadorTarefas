{% extends 'index.html' %}

{% block content %}
<a href="{% if data %}{% url 'tarefa_especifica' data %}{% else %}{% url 'tarefas' %}{% endif %}" class="btn-back">Voltar</a>
  <section class="form-add">
    <h1>Adicionar Tarefa</h1>

    <form method="post" action="">
      {% csrf_token %}
      <div class="form-group">
        <label for="nome">Nome</label>
        <input id="nome" name="nome" type="text" required>
      </div>

      <div class="form-group">
        <label for="descricao">Descrição</label>
        <textarea id="descricao" name="descricao" rows="4"></textarea>
      </div>

      <div class="form-group">
        <label for="prioridade">Prioridade</label>
        <select id="prioridade" name="prioridade" required>
          <option value="BA">Baixa</option>
          <option value="ME" selected>Média</option>
          <option value="AL">Alta</option>
        </select>
      </div>

      <div class="form-group">
        <label>Tempo estimado</label>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <div style="flex:1 1 120px;">
            <label for="horas_estimadas_horas">Horas</label>
            <input id="horas_estimadas_horas" name="horas_estimadas_horas" type="number" min="0" value="0" required>
          </div>
          <div style="flex:1 1 120px;">
            <label for="horas_estimadas_minutos">Minutos</label>
            <input id="horas_estimadas_minutos" name="horas_estimadas_minutos" type="number" min="0" max="59" value="0" required>
          </div>
        </div>
      </div>

      <input type="hidden" name="data" value="{{ data }}">

      <button type="submit" class="btn-blue">Salvar tarefa</button>
    </form>
  </section>
{% endblock %}
