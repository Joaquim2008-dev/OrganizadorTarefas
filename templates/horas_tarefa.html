{% extends 'index.html' %}
{% load static %}

{% block content %}
<h1>Horas da Tarefa</h1>

<section class='horas-container'>
  <header class='tarefa-detalhes'>
    <div class='detalhe-item'>
      <small class='item-label'>Tarefa</small>
      <h2>{{ tarefa.nome }}</h2>
    </div>

    <div class='detalhe-item'>
      <small class='item-label'>Prioridade</small>
      <span class='prioridade-badge {{ tarefa.prioridade|lower }}'>{{ tarefa.get_prioridade_display }}</span>
    </div>

    <div class='detalhe-item'>
      <small class='item-label'>Horas estimadas</small>
      <span>{{ tarefa.horas_estimadas_formatadas }}</span>
    </div>
  </header>

  <main>
    <section class='contador'>
      <div class="relogio">
        <h3>Tempo restante</h3>
        <h1 id="time"></h1>
      </div>

      <div class="escolher_tempo">
        <label for="tempo-minutos">Definir tempo (minutos)</label>
        <input type="number" id="tempo-minutos" min="1" max="999" value="45" />
      </div>

      <div class="painel">
        <button type="button" class="btn-cont btn-iniciar">Iniciar</button>
        <button type="button" class="btn-cont btn-pausar">Pausar</button>
        <button type="button" class="btn-cont btn-resetar">Resetar</button>
      </div>

      <form id="form-registrar-tempo" class="form-registrar-tempo">
        <h3>Registrar tempo trabalhado</h3>
        <div class="form-registrar-campos">
          <div class="form-campo">
            <label for="input-horas">Horas</label>
            <input type="number" id="input-horas" min="0" max="99" value="0" />
          </div>
          <div class="form-campo">
            <label for="input-minutos">Minutos</label>
            <input type="number" id="input-minutos" min="0" max="59" value="0" />
          </div>
          <button type="submit" class="btn-cont btn-registrar">Registrar</button>
        </div>
        <p id="msg-registrar-tempo" class="msg-registrar-tempo" hidden></p>
      </form>
    </section>
  </main>

  <div class='actions-row'>
    <a href="{% url 'tarefas' %}" class="btn-back">Home</a>
    <a href="{% url 'tarefa_especifica' data_cronograma %}" class="btn-back">Voltar</a>
  </div>
</section>

<script>
  /* ====== Elementos do DOM ====== */
  const btnIniciar = document.querySelector('.btn-iniciar')
  const btnPausar = document.querySelector('.btn-pausar')
  const btnResetar = document.querySelector('.btn-resetar')
  const tempoMinutosInput = document.getElementById('tempo-minutos')
  const timeDisplay = document.getElementById('time')

  /* ====== Áudio de alarme ====== */
  const audioAlarme = new Audio("{% static 'musicas/musica_fim_alarme.mp3' %}")
  let alarmeTimeoutId = null

  function pararAlarme() {
    audioAlarme.pause()
    audioAlarme.currentTime = 0
    if (alarmeTimeoutId !== null) {
      clearTimeout(alarmeTimeoutId)
      alarmeTimeoutId = null
    }
  }

  function tocarAlarme() {
    audioAlarme.play()
    alarmeTimeoutId = setTimeout(pararAlarme, 10000)
  }

  /* ====== Estado do cronômetro ====== */
  let intervaloId = null
  let segundosTotais = Number(tempoMinutosInput.value) * 60
  let segundosRestantes = segundosTotais

  /* ====== Helpers ====== */
  function formatarTempo(segundos) {
    const min = String(Math.floor(segundos / 60)).padStart(2, '0')
    const sec = String(segundos % 60).padStart(2, '0')
    return `${min}:${sec}`
  }

  function atualizarDisplay() {
    timeDisplay.textContent = formatarTempo(segundosRestantes)
  }

  function atualizarTempoTotal() {
    const minutos = Number(tempoMinutosInput.value)
    segundosTotais = Number.isFinite(minutos) && minutos > 0 ? minutos * 60 : 0
    segundosRestantes = segundosTotais
    atualizarDisplay()
  }

  /* ====== Inicialização ====== */
  atualizarTempoTotal()

  tempoMinutosInput.addEventListener('input', () => {
    atualizarTempoTotal()
  })

  /* ====== Controle do cronômetro ====== */
  function iniciarCronometro() {
    if (intervaloId !== null) return // já está em execução

    intervaloId = setInterval(() => {
      if (segundosRestantes <= 0) {
        clearInterval(intervaloId)
        intervaloId = null
        tocarAlarme()
        return
      }

      segundosRestantes -= 1
      atualizarDisplay()
    }, 1000)
  }

  function pausarCronometro() {
    if (intervaloId !== null) {
      clearInterval(intervaloId)
      intervaloId = null
    }
  }

  function resetarCronometro() {
    pausarCronometro()
    pararAlarme()
    atualizarTempoTotal()
  }

  /* ====== Registrar tempo manualmente ====== */
  const tarefaId = {{ tarefa.id }}

  function getCookie(name) {
    const value = `; ${document.cookie}`
    const parts = value.split(`; ${name}=`)
    if (parts.length === 2) return parts.pop().split(';').shift()
    return ''
  }

  const formRegistrar = document.getElementById('form-registrar-tempo')
  const msgRegistrar = document.getElementById('msg-registrar-tempo')

  formRegistrar.addEventListener('submit', (event) => {
    event.preventDefault()

    const horas = Math.max(0, parseInt(document.getElementById('input-horas').value, 10) || 0)
    const minutos = Math.max(0, parseInt(document.getElementById('input-minutos').value, 10) || 0)
    const totalMinutos = horas * 60 + minutos

    if (totalMinutos === 0) {
      mostrarMsg('Informe ao menos 1 minuto.', false)
      return
    }

    fetch('{% url "api-registrar-tempo-trabalhado" %}', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': getCookie('csrftoken'),
      },
      body: JSON.stringify({ tarefa_id: tarefaId, minutos: totalMinutos }),
    })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          mostrarMsg('Tempo registrado com sucesso!', true)
          document.getElementById('input-horas').value = 0
          document.getElementById('input-minutos').value = 0
        } else {
          mostrarMsg('Falha: ' + (data.error || 'erro desconhecido'), false)
        }
      })
      .catch(() => mostrarMsg('Erro de conexão.', false))
  })

  function mostrarMsg(texto, sucesso) {
    msgRegistrar.textContent = texto
    msgRegistrar.style.color = sucesso ? 'green' : 'red'
    msgRegistrar.hidden = false
    setTimeout(() => { msgRegistrar.hidden = true }, 4000)
  }

  /* ====== Eventos ====== */
  btnIniciar.addEventListener('click', iniciarCronometro)
  btnPausar.addEventListener('click', pausarCronometro)
  btnResetar.addEventListener('click', resetarCronometro)
</script>

{% endblock %}
